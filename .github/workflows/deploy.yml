name: Deploy Flet App to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          pip install flet

      - name: Build Web Static Files
        run: |
          yes | flet build web --module-name home
          sed -i 's|<base href="/">|<base href="/myportfolio/">|g' build/web/index.html
          
          # Dual assets path එක හරියටම ක්‍රියාත්මක කිරීමට:
          mkdir -p build/web/myportfolio
          cp -r build/web/assets build/web/myportfolio/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages