    <!-- ✉️ Contact Section Start -->
    <section class="contact-section">
        <div class="contact-container">
            <!-- <span class="sub-title">GET IN TOUCH</span> -->
            <h2>Let's Build Something Together</h2>
            <p class="contact-intro">Feel free to reach out for collaborations, project inquiries, or just to say hello.</p>

            <div class="contact-wrapper">
                <!-- වම් පැත්ත: Contact Info Details -->
                <div class="contact-info">
                    <div class="info-row">
                        <i class="fas fa-envelope"></i>
                        <div>
                            <h4>Email Me</h4>
                            <!-- 💡 මල්ලි, මෙතනට ඔයාගේ කැම්පස් හෝ පෞද්ගලික ඊමේල් එක දාන්න -->
                            <p>sahanmadushanka678@gmail.com</p>
                        </div>
                    </div>

                    <div class="info-row">
                        <i class="fas fa-phone-alt"></i>
                        <div>
                            <h4>Call Me</h4>
                            <p>+94 76 248 0782</p>
                        </div>
                    </div>

                    <div class="info-row">
                        <i class="fas fa-map-marker-alt"></i>
                        <div>
                            <h4>Location</h4>
                            <p>Sri Lanka</p>
                        </div>
                    </div>
                </div>

                <!-- දකුණු පැත්ත: Minimalist Message Form -->
                <div class="contact-form-container">
                    <form class="contact-form">
                        <div class="form-group">
                            <input type="text" id="name" placeholder="Your Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" id="email" placeholder="Your Email" required>
                        </div>
                        <div class="form-group">
                            <input type="text" id="subject" placeholder="Subject" required>
                        </div>
                        <div class="form-group">
                            <textarea id="message" rows="6" placeholder="Your Message" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Send Message <i class="fas fa-paper-plane"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </section>
    <!-- ✉️ Contact Section End -->
